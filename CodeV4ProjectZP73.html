<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Timer</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #1e3c72, #2a5298);
    color: white;
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .container {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 30px 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    max-width: 400px;
    width: 90%;
  }

  h1 {
    margin-bottom: 10px;
    font-weight: 600;
  }

  #title {
    font-size: 20px;
    opacity: 0.8;
    margin-bottom: 20px;
  }

  #countdown {
    font-size: 32px;
    font-weight: 600;
    letter-spacing: 1px;
  }

  .expired {
    color: #ff6b6b;
  }

  .hint {
    margin-top: 20px;
    font-size: 14px;
    opacity: 0.7;
  }
</style>
</head>
<body>

<div class="container">
  <h1>Countdown</h1>
  <div id="title">Kein Timer angegeben</div>
  <div id="countdown">--</div>
  <div class="hint">Beispiel: ?title=Urlaub&date=2026-12-31T00:00</div>
</div>

<script>
function getParams() {
  const params = new URLSearchParams(window.location.search);
  return {
    title: params.get('title'),
    date: params.get('date')
  };
}

function startCountdown(title, datetime) {
  const titleEl = document.getElementById('title');
  const countdownEl = document.getElementById('countdown');

  if (!datetime) return;

  titleEl.textContent = title || 'Timer';

  const target = new Date(datetime).getTime();

  const interval = setInterval(() => {
    const now = new Date().getTime();
    const distance = target - now;

    if (distance <= 0) {
      clearInterval(interval);
      countdownEl.textContent = 'ABGELAUFEN';
      countdownEl.classList.add('expired');
      return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((distance / (1000 * 60)) % 60);
    const seconds = Math.floor((distance / 1000) % 60);

    countdownEl.textContent = `${days}d ${hours}h ${minutes}m ${seconds}s`;
  }, 1000);
}

function init() {
  const { title, date } = getParams();
  startCountdown(title, date);
}

init();
</script>

</body>
</html>
